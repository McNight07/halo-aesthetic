<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Admin — Halo Aesthetic</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,500;1,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="images/favicon.svg">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <nav class="navbar">
    <a href="index.html" class="logo"><img src="images/logo.svg" alt="Halo Aesthetic" class="logo-img"></a>
    <ul class="nav-links">
      <li><a href="index.html">Back to Site</a></li>
    </ul>
  </nav>
</header>

<section class="hero" style="min-height: 24vh;">
  <div>
    <div class="hero-eyebrow">Private</div>
    <h1>Admin Dashboard</h1>
  </div>
</section>

<section>
  <div class="container" style="max-width: 760px;">
    <div id="login-panel" class="form-panel">
      <div class="form-group">
        <label for="admin-password">Password</label>
        <input type="password" id="admin-password" autocomplete="current-password">
      </div>
      <button class="btn btn-solid" id="admin-login-btn">Log In</button>
      <div id="login-status"></div>
    </div>

    <div id="dashboard-panel" style="display: none;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
        <p style="color: var(--text-muted); margin: 0;">Showing the most recent 200 of each.</p>
        <button class="btn" id="admin-logout-btn">Log Out</button>
      </div>

      <div class="section-header" style="text-align: left; margin-bottom: 20px;">
        <h2 style="font-size: 1.6rem;">Bookings</h2>
      </div>
      <div id="bookings-list"></div>

      <div class="section-header" style="text-align: left; margin: 50px 0 20px;">
        <h2 style="font-size: 1.6rem;">Contact Messages</h2>
      </div>
      <div id="messages-list"></div>
    </div>
  </div>
</section>

<div class="toast" id="toast"></div>

<script src="js/admin.js"></script>
</body>
</html>
